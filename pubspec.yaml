name: inventory_manager
description: A full-featured Pharmacy Management System for Ethiopia.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1
  firebase_messaging: ^15.2.10
  provider: ^6.1.2
  flutter_localizations:
    sdk: flutter
  intl: any
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  badges: ^3.1.2
  uuid: ^4.5.1
  flutter_animate: ^4.5.2
  adaptive_dialog: ^2.1.2
  lottie: ^3.1.2
  flutter_local_notifications: ^17.2.1
  permission_handler: ^11.3.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  path_provider: ^2.1.5
  path: ^1.9.1
  csv: ^6.0.0
  excel: ^4.0.6
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.5.5
  file_picker: ^8.0.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1B8A5A"
  adaptive_icon_foreground: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 256
  linux:
    generate: true
    image_path: "assets/icon.png"
  macos:
    generate: true
    image_path: "assets/icon.png"
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#1B8A5A"
    theme_color: "#1B8A5A"

flutter:
  uses-material-design: true
  # To add assets, uncomment the following:
  # assets:
  #   - assets/animations/
  #   - assets/images/
